<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil | ADDICTICA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="bg-slate-50 text-slate-700 font-['Plus_Jakarta_Sans'] min-h-screen">

  <!-- Header -->
  <header class="bg-[#0b3c6d] text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-lg font-semibold tracking-wide">Profil Pengguna</h1>
        <p class="text-xs text-white/70">Klasifikasi Kecanduan Game Online</p>
      </div>
      <a href="/logout"
         class="inline-flex items-center justify-center rounded-full bg-white/95 px-5 py-2 text-xs font-semibold text-[#0b3c6d] hover:bg-white transition">
        Logout
      </a>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-8 lg:flex lg:gap-8">
    <!-- Sidebar -->
    <aside class="lg:w-72">
      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="text-center">
          <img id="sidebarFoto"
               src="/uploads/default.png"
               class="w-20 h-20 mx-auto rounded-full object-cover shadow border-4 border-[#0b3c6d] hidden">

          <div id="sidebarInitial"
               class="w-20 h-20 mx-auto rounded-full bg-[#0b3c6d] flex items-center justify-center text-white text-2xl font-bold shadow">
            U
          </div>

          <h2 id="sidebarNama" class="mt-4 font-semibold text-slate-900">Nama User</h2>
          <p id="sidebarEmail" class="text-xs text-slate-500">user@email.com</p>
        </div>

        <nav class="mt-8 space-y-2">
          <a href="/dashboard"
             class="flex items-center justify-between rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">
            Dashboard
          </a>
          <a href="/profil"
             class="flex items-center justify-between rounded-xl bg-[#0b3c6d] px-4 py-3 text-sm font-semibold text-white shadow">
            Profil
          </a>
          <a href="/user_konsultasi"
             class="flex items-center justify-between rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">
            Konsultasi
          </a>
          <a href="/user_hasil"
             class="flex items-center justify-between rounded-xl px-4 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">
            Hasil
          </a>
        </nav>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 mt-6 lg:mt-0">
      <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm max-w-3xl">
        <div class="text-center mb-8">
          <img id="fotoProfil"
               src="/uploads/default.png"
               class="mx-auto w-32 h-32 rounded-full border-4 border-[#0b3c6d] object-cover shadow">
          <h2 class="mt-5 text-2xl font-['Sora'] font-semibold text-slate-900">
            Profil Anda
          </h2>
          <p class="text-sm text-slate-500">Perbarui informasi akun Anda dengan mudah.</p>
        </div>

        <form action="/profil/update" method="POST" enctype="multipart/form-data" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Nama
            </label>
            <input type="text"
                   name="nama"
                   id="nama"
                   class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0b3c6d]/30">
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Email
            </label>
            <input type="email"
                   id="email"
                   class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm text-slate-500"
                   disabled>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Upload Foto Profil
            </label>
            <input type="file"
                   name="foto"
                   id="inputFoto"
                   class="w-full text-sm text-slate-600 file:mr-4 file:rounded-full file:border-0 file:bg-slate-100 file:px-4 file:py-2 file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200">
          </div>

          <div class="flex flex-wrap items-center gap-4">
            <button type="submit"
                    class="inline-flex items-center justify-center rounded-xl bg-[#0b3c6d] px-8 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-900/10 transition hover:bg-[#0f4c81]">
              Simpan Perubahan
            </button>
            <a href="/dashboard"
               class="text-sm font-semibold text-[#0b3c6d] hover:underline">
              Kembali
            </a>
          </div>
        </form>
      </div>
    </main>
  </div>

  <!-- Script -->
  <script>
  fetch("/api/user")
    .then(res => res.json())
    .then(data => {

      // Form
      document.getElementById("nama").value = data.nama || "";
      document.getElementById("email").value = data.email || "";

      // Foto besar
      if (data.foto) {
        document.getElementById("fotoProfil").src = "/uploads/" + data.foto;
      }

      // Sidebar
      document.getElementById("sidebarNama").innerText = data.nama || "-";
      document.getElementById("sidebarEmail").innerText = data.email || "-";

      if (data.foto) {
        document.getElementById("sidebarFoto").src = "/uploads/" + data.foto;
        document.getElementById("sidebarFoto").classList.remove("hidden");
        document.getElementById("sidebarInitial").classList.add("hidden");
      } else {
        const huruf = data.nama ? data.nama.charAt(0).toUpperCase() : "U";
        document.getElementById("sidebarInitial").innerText = huruf;
        document.getElementById("sidebarFoto").classList.add("hidden");
        document.getElementById("sidebarInitial").classList.remove("hidden");
      }

    })
    .catch(() => console.log("Gagal mengambil data user"));
  </script>

</body>
</html>

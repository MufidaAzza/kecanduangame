<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar | ADDICTICA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body class="bg-slate-50 text-slate-700 font-['Plus_Jakarta_Sans']">

  <!-- Navbar -->
  <nav class="bg-[#0b3c6d] text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between py-4">
        <a href="/" class="flex items-center gap-3">
          <span class="flex h-11 w-11 items-center justify-center rounded-xl bg-white text-[#0b3c6d] font-bold">
            AG
          </span>
          <div>
            <p class="text-sm font-semibold tracking-wide">ADDICTICA</p>
            <p class="text-xs text-white/70">Fuzzy Tsukamoto</p>
          </div>
        </a>

        <div class="hidden md:flex items-center gap-6 text-sm font-medium">
          <a href="/" class="text-white/80 hover:text-white transition">Beranda</a>
          <a href="/tentang" class="text-white/80 hover:text-white transition">Tentang Sistem</a>
          <a href="/gejala" class="text-white/80 hover:text-white transition">Gejala</a>
          <a href="/konsultasi" class="text-white/80 hover:text-white transition">Konsultasi</a>
          <a href="/hasil" class="text-white/80 hover:text-white transition">Hasil</a>

          <a href="/login"
             class="rounded-full border border-yellow-300/70 px-4 py-2 text-xs font-semibold text-yellow-100 hover:bg-yellow-300 hover:text-[#0b3c6d] transition">
            Login
          </a>
          <a href="/register"
             class="rounded-full bg-yellow-300 px-4 py-2 text-xs font-semibold text-[#0b3c6d] shadow-sm">
            Daftar
          </a>
        </div>
      </div>

      <div class="md:hidden pb-4">
        <details class="group">
          <summary class="list-none inline-flex cursor-pointer items-center gap-2 rounded-full border border-white/30 px-4 py-2 text-xs font-semibold">
            Menu
            <span class="text-white/70 group-open:rotate-180 transition">v</span>
          </summary>
          <div class="mt-4 flex flex-col gap-3 text-sm">
            <a href="/" class="text-white/80 hover:text-white transition">Beranda</a>
            <a href="/tentang" class="text-white/80 hover:text-white transition">Tentang Sistem</a>
            <a href="/gejala" class="text-white/80 hover:text-white transition">Gejala</a>
            <a href="/konsultasi" class="text-white/80 hover:text-white transition">Konsultasi</a>
            <a href="/hasil" class="text-white/80 hover:text-white transition">Hasil</a>
            <div class="flex gap-3 pt-2">
              <a href="/login"
                 class="flex-1 rounded-full border border-yellow-300/70 px-4 py-2 text-center text-xs font-semibold text-yellow-100 hover:bg-yellow-300 hover:text-[#0b3c6d] transition">
                Login
              </a>
              <a href="/register"
                 class="flex-1 rounded-full bg-yellow-300 px-4 py-2 text-center text-xs font-semibold text-[#0b3c6d] shadow-sm">
                Daftar
              </a>
            </div>
          </div>
        </details>
      </div>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-5xl grid lg:grid-cols-2 gap-10 items-center">
      <div class="hidden lg:block">
        <div class="rounded-3xl bg-white p-5 shadow-xl">
          <img src="/img/sign.jpg" alt="Sign" class="w-full rounded-2xl object-cover">
        </div>
      </div>

      <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
        <h2 class="text-2xl font-['Sora'] font-semibold text-slate-900 mb-2">
          Buat Akun Baru
        </h2>
        <p class="text-slate-500 mb-6">
          Lengkapi data berikut untuk mulai menggunakan sistem.
        </p>

        <form action="/register" method="POST" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
            <input
              type="text"
              name="nama"
              placeholder="Masukkan nama lengkap"
              required
              class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0b3c6d]/30"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input
              type="email"
              name="email"
              placeholder="contoh@email.com"
              required
              class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0b3c6d]/30"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Kata Sandi</label>
            <input
              type="password"
              name="password"
              placeholder="Masukkan kata sandi"
              required
              class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0b3c6d]/30"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Konfirmasi Kata Sandi</label>
            <input
              type="password"
              name="confirm_password"
              placeholder="Ulangi kata sandi"
              required
              class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-[#0b3c6d]/30"
            >
          </div>

          <button
            type="submit"
            class="w-full rounded-xl bg-[#0b3c6d] py-3 text-sm font-semibold text-white shadow-lg shadow-blue-900/10 transition hover:bg-[#0f4c81]"
          >
            Daftar
          </button>
        </form>

        <p class="text-center text-sm text-slate-600 mt-5">
          Sudah punya akun?
          <a href="/login" class="text-[#0b3c6d] font-semibold hover:underline">
            Login
          </a>
        </p>
      </div>
    </div>
  </section>

</body>
</html>
